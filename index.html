<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 600px; margin: 0 auto; }
        button { background: #007bff; color: white; border: none; padding: 12px 20px; margin: 5px; border-radius: 8px; cursor: pointer; }
        .card { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-top: 20px; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; }
        .libro { background: white; padding: 10px; margin: 5px 0; border-left: 4px solid #007bff; border-radius: 5px; }
        .tachado { text-decoration: line-through; opacity: 0.6; }
        #scannerModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 1000; padding: 20px; }
        #qr-reader { width: 100%; margin-top: 50px; }
    </style>
</head>
<body>
    <h1>📚 Biblioteca</h1>
    <div>
        <button id="btnLote">📦 Escanear LOTE</button>
        <button id="btnDevo">🔄 Escanear DEVOLUCIÓN</button>
        <button id="btnLista">⏳ Préstamos</button>
        <button id="btnBuscar">🔍 Buscar alumno</button>
    </div>
    <div id="panel" class="card"><p>Selecciona una opción</p></div>
    <div id="scannerModal">
        <button id="btnCerrar" style="background:white;color:black;">✖ Cerrar</button>
        <div id="qr-reader"></div>
    </div>

    <script>
        (function() {
            // CONFIGURACIÓN - CAMBIA SOLO ESTAS DOS LÍNEAS
            const SUPABASE_URL = "https://klwrclwbzvupqxcxljst.supabase.co";
            const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtsd3JjbHdienZ1cHF4Y3hsanN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MjExMTMsImV4cCI6MjA5NDM5NzExM30.GdcE2wSREkSt6DHjjs7L5MxYobdNZsz6wAvI_XvsGVk";
            
            const supabase = supabase_js.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            let scanner = null;
            let modo = "";
            let lote = [];
            let devoAlumno = null;
            let devoLibros = [];

            function panel(html) { document.getElementById("panel").innerHTML = html; }

            function abrirScanner(modoNuevo) {
                modo = modoNuevo;
                document.getElementById("scannerModal").style.display = "block";
                if (!scanner) scanner = new Html5Qrcode("qr-reader");
                scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 },
                    (texto) => { scanner.stop(); cerrarScanner(); procesar(texto); },
                    () => {}
                ).catch(e => { alert("Error cámara: " + e); cerrarScanner(); });
            }

            function cerrarScanner() {
                if (scanner && scanner.isScanning) scanner.stop();
                document.getElementById("scannerModal").style.display = "none";
            }

            async function procesar(codigo) {
                let { data: libro } = await supabase.from("libros").select("*").eq("codigo_barras", codigo).maybeSingle();
                if (!libro) {
                    let titulo = prompt("Nuevo libro. Título:");
                    if (!titulo) return;
                    let { data: nuevo } = await supabase.from("libros").insert({ codigo_barras: codigo, titulo: titulo }).select().single();
                    libro = nuevo;
                    alert("✅ Libro añadido: " + titulo);
                }
                if (modo === "lote") {
                    if (!lote.find(l => l.codigo_barras === libro.codigo_barras)) {
                        lote.push(libro);
                        alert("Añadido: " + libro.titulo + " (Total: " + lote.length + ")");
                    } else alert("Ya está en el lote");
                    mostrarLote();
                } else if (modo === "devo") {
                    await procesarDevo(libro);
                }
            }

            function mostrarLote() {
                let html = `<h2>📦 LOTE (${lote.length})</h2><button id="escanearLote">📷 Escanear</button><button id="cancelarLote" class="secondary">Cancelar</button>`;
                if (lote.length > 0) {
                    lote.forEach(l => html += `<div class="libro">📖 ${l.titulo}</div>`);
                    html += `<hr><input id="nombreAlumno" placeholder="Nombre alumno"><input id="cursoAlumno" placeholder="Curso"><button id="asignarLote">✅ Asignar ${lote.length} libros</button>`;
                }
                html += `<button id="volverLote">← Volver</button>`;
                panel(html);
                document.getElementById("escanearLote")?.onclick = () => abrirScanner("lote");
                document.getElementById("cancelarLote")?.onclick = () => { lote = []; mostrarLote(); };
                document.getElementById("asignarLote")?.onclick = asignarLote;
                document.getElementById("volverLote").onclick = menu;
            }

            async function asignarLote() {
                let nombre = document.getElementById("nombreAlumno").value.trim();
                if (!nombre) { alert("Nombre requerido"); return; }
                let curso = document.getElementById("cursoAlumno").value;
                let { data: alumno } = await supabase.from("alumnos").select("id").eq("nombre", nombre).maybeSingle();
                if (!alumno) {
                    let { data: nuevo } = await supabase.from("alumnos").insert({ nombre: nombre, curso: curso }).select().single();
                    alumno = nuevo;
                }
                for (let libro of lote) {
                    await supabase.from("prestamos").insert({ libro_codigo: libro.codigo_barras, alumno_id: alumno.id, fecha_prestamo: new Date().toISOString().slice(0,10) });
                }
                alert("✅ " + lote.length + " libros a " + nombre);
                lote = [];
                menu();
            }

            async function iniciarDevo() {
                devoAlumno = null;
                modo = "devo";
                panel(`<h2>🔄 Devolución</h2><p>Escanea el primer libro</p><button id="primerLibro">📷 Escanear</button><button id="cancelarDevo" class="secondary">Cancelar</button>`);
                document.getElementById("primerLibro")?.onclick = () => abrirScanner("devo");
                document.getElementById("cancelarDevo")?.onclick = menu;
            }

            async function procesarDevo(libro) {
                if (!devoAlumno) {
                    let { data: prestamo } = await supabase.from("prestamos").select("*, alumnos(*)").eq("libro_codigo", libro.codigo_barras).eq("entregado", false).maybeSingle();
                    if (!prestamo) { alert("No está prestado"); iniciarDevo(); return; }
                    devoAlumno = prestamo.alumnos;
                    let { data: prestamos } = await supabase.from("prestamos").select("*, libros(*)").eq("alumno_id", devoAlumno.id).eq("entregado", false);
                    devoLibros = prestamos.map(p => ({ id: p.id, codigo: p.libros.codigo_barras, titulo: p.libros.titulo, devuelto: false }));
                    let encontrado = devoLibros.find(l => l.codigo === libro.codigo_barras);
                    if (encontrado) {
                        await supabase.from("prestamos").update({ entregado: true, fecha_devolucion: new Date().toISOString().slice(0,10) }).eq("id", encontrado.id);
                        encontrado.devuelto = true;
                    }
                    mostrarListaDevo();
                } else {
                    let encontrado = devoLibros.find(l => l.codigo === libro.codigo_barras);
                    if (encontrado && !encontrado.devuelto) {
                        await supabase.from("prestamos").update({ entregado: true, fecha_devolucion: new Date().toISOString().slice(0,10) }).eq("id", encontrado.id);
                        encontrado.devuelto = true;
                        alert("Devuelto: " + libro.titulo);
                        mostrarListaDevo();
                    } else alert(encontrado ? "Ya devuelto" : "No es de " + devoAlumno.nombre);
                }
            }

            function mostrarListaDevo() {
                let todos = devoLibros.every(l => l.devuelto);
                let html = `<h2>🔄 Devolviendo: ${devoAlumno.nombre}</h2><p>Curso: ${devoAlumno.curso || "-"}</p><h3>Libros:</h3>`;
                if (todos) html += `<p>✅ Todos devueltos</p><button id="finDevo">Finalizar</button>`;
                else {
                    html += `<button id="siguienteDevo">📷 Escanear</button>`;
                    devoLibros.forEach(l => { html += `<div class="libro ${l.devuelto ? 'tachado' : ''}">📖 ${l.titulo} ${l.devuelto ? '✅' : '⏳'}</div>`; });
                }
                html += `<button id="cancelarDevo2" class="secondary">Cancelar</button>`;
                panel(html);
                if (!todos) document.getElementById("siguienteDevo")?.onclick = () => abrirScanner("devo");
                else document.getElementById("finDevo")?.onclick = () => { devoAlumno = null; menu(); };
                document.getElementById("cancelarDevo2")?.onclick = () => { devoAlumno = null; menu(); };
            }

            async function mostrarLista() {
                let { data: pendientes } = await supabase.from("prestamos_activos").select("*").order("alumno");
                if (!pendientes?.length) { panel(`<h2>✅ No hay préstamos</h2><button onclick="location.reload()">Volver</button>`); return; }
                let html = `<h2>📋 Préstamos (${pendientes.length})</h2>`;
                let ultimo = "";
                pendientes.forEach(p => {
                    if (p.alumno !== ultimo) {
                        if (ultimo) html += `</div>`;
                        html += `<div><strong>👤 ${p.alumno}</strong><div style="margin-left:15px;">`;
                        ultimo = p.alumno;
                    }
                    html += `<div class="libro">📖 ${p.libro}</div>`;
                });
                html += `</div></div><button id="volverLista">Volver</button>`;
                panel(html);
                document.getElementById("volverLista").onclick = menu;
            }

            async function buscar() {
                panel(`<h2>🔍 Buscar</h2><input id="nombreBuscar" placeholder="Nombre"><button id="btnBuscarNombre">Buscar</button><button id="volverBuscar" class="secondary">Volver</button><div id="resultados"></div>`);
                document.getElementById("btnBuscarNombre").onclick = async () => {
                    let nombre = document.getElementById("nombreBuscar").value.trim();
                    if (!nombre) return;
                    let { data: alumnos } = await supabase.from("alumnos").select("*").ilike("nombre", `%${nombre}%`);
                    if (!alumnos?.length) { document.getElementById("resultados").innerHTML = "<p>No encontrado</p>"; return; }
                    let html = "";
                    for (let a of alumnos) {
                        let { data: prestamos } = await supabase.from("prestamos_activos").select("*").eq("alumno", a.nombre);
                        html += `<div style="background:white; padding:10px; margin:5px; border-radius:5px;"><strong>${a.nombre}</strong> (${a.curso || "-"})<br>📚 ${prestamos?.length || 0} libros<button onclick="verLibros(${a.id}, '${a.nombre}')">Ver</button></div>`;
                    }
                    document.getElementById("resultados").innerHTML = html;
                };
                document.getElementById("volverBuscar").onclick = menu;
            }

            window.verLibros = async (id, nombre) => {
                let { data: prestamos } = await supabase.from("prestamos_activos").select("*").eq("alumno", nombre);
                let html = `<h2>📚 ${nombre}</h2>`;
                if (!prestamos?.length) html += "<p>No tiene libros</p>";
                else prestamos.forEach(p => html += `<div class="libro">📖 ${p.libro}</div>`);
                html += `<button id="volverLibros">Volver</button>`;
                panel(html);
                document.getElementById("volverLibros").onclick = buscar;
            };

            function menu() {
                modo = "";
                lote = [];
                devoAlumno = null;
                panel("<p>Selecciona una opción</p>");
            }

            document.getElementById("btnLote").onclick = () => { lote = []; mostrarLote(); };
            document.getElementById("btnDevo").onclick = iniciarDevo;
            document.getElementById("btnLista").onclick = mostrarLista;
            document.getElementById("btnBuscar").onclick = buscar;
            document.getElementById("btnCerrar").onclick = cerrarScanner;
            menu();
        })();
    </script>
</body>
</html>
