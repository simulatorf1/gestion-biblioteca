<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Banco de Libros</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .top-bar { background: white; border-radius: 16px; padding: 12px 24px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .year-selector { display: flex; align-items: center; gap: 12px; background: #f8fafc; padding: 8px 16px; border-radius: 40px; }
        .year-selector select { padding: 8px 12px; border-radius: 24px; border: 1px solid #cbd5e1; font-weight: bold; }
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 2px solid #e2e8f0; flex-wrap: wrap; }
        .nav-tab { padding: 12px 24px; background: transparent; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; border-radius: 12px 12px 0 0; color: #64748b; }
        .nav-tab.active { color: #2563eb; border-bottom: 3px solid #2563eb; background: #eff6ff; }
        .card { background: white; border-radius: 20px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        button { background: #2563eb; color: white; border: none; padding: 10px 18px; border-radius: 40px; font-weight: 500; cursor: pointer; font-size: 0.9rem; }
        button.secondary { background: #64748b; }
        button.danger { background: #dc2626; }
        button.success { background: #10b981; }
        .alumno-row { background: #f8fafc; padding: 16px; margin-bottom: 12px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; border-left: 4px solid #2563eb; cursor: pointer; }
        .alumno-row:hover { background: #e2e8f0; }
        .alumno-info { flex: 1; }
        .alumno-actions { display: flex; gap: 8px; }
        .edit-icon { cursor: pointer; font-size: 1.2rem; padding: 4px 8px; background: #e2e8f0; border-radius: 40px; display: inline-block; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 0.9rem; }
        label { font-weight: 500; display: block; margin-bottom: 4px; }
        .search-filters { background: #f8fafc; padding: 16px; border-radius: 16px; margin-bottom: 20px; }
        #scannerModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 10000; padding: 20px; }
        #qr-reader { width: 100%; margin-top: 60px; }
        .flex { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .resultados { max-height: 500px; overflow-y: auto; }
        .tachado { text-decoration: line-through; opacity: 0.6; }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <h1 style="margin:0">📚 Banco de Libros</h1>
        <div class="year-selector">
            <span>📅 Año Académico:</span>
            <select id="selectAnoAcademico"></select>
            <span id="anoActivoBadge" style="background:#10b981; color:white; padding:4px 12px; border-radius:40px; font-size:0.8rem;">Activo</span>
        </div>
    </div>

    <div class="nav-tabs">
        <button class="nav-tab active" data-tab="alumnos">👨‍🎓 ALUMNOS</button>
        <button class="nav-tab" data-tab="socios">💰 SOCIOS AMPA</button>
        <button class="nav-tab" data-tab="biblioteca">📖 BIBLIOTECA</button>
        <button class="nav-tab" data-tab="informes">📊 INFORMES</button>
        <button class="nav-tab" data-tab="prestamos">🔄 PRÉSTAMOS</button>
    </div>

    <div id="mainPanel"></div>
</div>

<div id="scannerModal">
    <button id="btnCerrarScanner" style="background:white; color:black; width:auto;">✖ Cerrar</button>
    <div id="qr-reader"></div>
</div>

<script>
(function() {
    // ==================== CONFIGURACIÓN ====================
    const SUPABASE_URL = "https://klwrclwbzvupqxcxljst.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtsd3JjbHdienZ1cHF4Y3hsanN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MjExMTMsImV4cCI6MjA5NDM5NzExM30.GdcE2wSREkSt6DHjjs7L5MxYobdNZsz6wAvI_XvsGVk";
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let html5QrCode = null;
    let currentTab = 'alumnos';
    let currentAnoId = null;
    let currentEditingAlumnoId = null;
    let modoActual = "";
    let scannerActivo = false;
    
    // ==================== INICIALIZACIÓN ====================
    async function init() {
        await cargarAnosAcademicos();
        setupEventListeners();
        cargarTab(currentTab);
    }
    
    async function cargarAnosAcademicos() {
        const { data: anos } = await supabase.from('ano_academico').select('*').order('id', { ascending: false });
        const select = document.getElementById('selectAnoAcademico');
        if(!anos || anos.length === 0) {
            select.innerHTML = '<option>Crear años académicos en SQL</option>';
            return;
        }
        select.innerHTML = '';
        anos.forEach(ano => {
            const option = document.createElement('option');
            option.value = ano.id;
            option.textContent = `${ano.nombre} ${ano.activo ? '(Activo)' : ''}`;
            if (ano.activo) {
                option.selected = true;
                currentAnoId = ano.id;
            }
            select.appendChild(option);
        });
        select.addEventListener('change', (e) => {
            currentAnoId = parseInt(e.target.value);
            if (currentTab) cargarTab(currentTab);
        });
    }
    
    function setupEventListeners() {
        document.querySelectorAll('.nav-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTab = btn.dataset.tab;
                cargarTab(currentTab);
            });
        });
        document.getElementById('btnCerrarScanner').addEventListener('click', cerrarScanner);
    }
    
    async function cargarTab(tab) {
        const panel = document.getElementById('mainPanel');
        if (!currentAnoId) { 
            panel.innerHTML = '<div class="card">⚠️ Selecciona o crea un año académico en la base de datos.</div>'; 
            return;
        }
        if(tab === 'alumnos') await cargarAlumnos();
        else if(tab === 'socios') await cargarSocios();
        else if(tab === 'biblioteca') await cargarBiblioteca();
        else if(tab === 'informes') await cargarInformes();
        else if(tab === 'prestamos') await cargarPrestamosRapido();
    }
    
    // ==================== ALUMNOS (NUEVA VERSIÓN CON BUSCADOR) ====================
    async function cargarAlumnos() {
        let html = `
            <div class="card">
                <div class="flex"><h2>👨‍🎓 Buscar Alumno</h2><button id="btnNuevoAlumno" class="success">➕ Nuevo Alumno</button></div>
                <div class="search-filters">
                    <div class="form-grid">
                        <div><label>🔍 Nombre</label><input type="text" id="searchNombre" placeholder="Ej: María"></div>
                        <div><label>🔍 Apellidos</label><input type="text" id="searchApellidos" placeholder="Ej: García López"></div>
                        <div><label>Curso</label><select id="searchCurso">
                            <option value="">Todos</option>
                            <option>1ESO</option><option>2ESO</option><option>3ESO</option><option>4ESO</option>
                            <option>1BAC</option><option>2BAC</option>
                        </select></div>
                        <div><label>Código de usuario</label><input type="text" id="searchCodigo" placeholder="Ej: 202670001"></div>
                    </div>
                    <button id="btnBuscar" style="margin-top:10px;">Buscar</button>
                    <button id="btnLimpiar" class="secondary" style="margin-top:10px;">Limpiar</button>
                </div>
                <div id="resultadosBusqueda" class="resultados">
                    <p style="color:#64748b; text-align:center;">🔎 Usa el buscador para encontrar alumnos</p>
                </div>
            </div>
        `;
        document.getElementById('mainPanel').innerHTML = html;
        
        document.getElementById('btnNuevoAlumno').onclick = () => editarAlumno(null);
        document.getElementById('btnBuscar').onclick = () => buscarAlumnosMejorado();
        document.getElementById('btnLimpiar').onclick = () => {
            document.getElementById('searchNombre').value = '';
            document.getElementById('searchApellidos').value = '';
            document.getElementById('searchCurso').value = '';
            document.getElementById('searchCodigo').value = '';
            document.getElementById('resultadosBusqueda').innerHTML = '<p style="color:#64748b; text-align:center;">🔎 Usa el buscador para encontrar alumnos</p>';
        };
        
        // Permitir buscar con Enter en cualquier campo
        const inputs = ['searchNombre', 'searchApellidos', 'searchCurso', 'searchCodigo'];
        inputs.forEach(id => {
            const el = document.getElementById(id);
            if(el) el.addEventListener('keypress', (e) => { if(e.key === 'Enter') buscarAlumnosMejorado(); });
        });
    }


    async function buscarAlumnosMejorado() {
        // Obtener el año activo
        const { data: anoActivo, error: anoError } = await supabaseDebug
            .from('ano_academico')
            .select('id')
            .eq('activo', true)
            .single();
        
        if (anoError) {
            console.error("Error obteniendo año activo:", anoError);
            return;
        }
        
        const anoId = anoActivo.id;
        
        const nombreRaw = document.getElementById('searchNombre').value.trim();
        const apellidosRaw = document.getElementById('searchApellidos').value.trim();
        const cursoFiltro = document.getElementById('searchCurso').value;
        const codigoRaw = document.getElementById('searchCodigo').value.trim();
        
        const resultadosDiv = document.getElementById('resultadosBusqueda');
        
        const nombreBusq = normalizarTexto(nombreRaw);
        const apellidosBusq = normalizarTexto(apellidosRaw);
        
        resultadosDiv.innerHTML = '<p>Buscando...</p>';
        
        // Consultar historial del año activo
        const { data: historiales, error } = await supabaseDebug
            .from('historial_alumnos')
            .select('*, alumnos(*)')
            .eq('ano_academico_id', anoId);
        
        if (error) {
            resultadosDiv.innerHTML = `<p>Error: ${error.message}</p>`;
            return;
        }
        
        if (!historiales || historiales.length === 0) {
            resultadosDiv.innerHTML = '<p>No hay alumnos en el año académico actual</p>';
            return;
        }
        
        // Convertir a formato usable
        let resultados = historiales.map(h => ({
            id: h.alumnos.id,
            nombre: h.alumnos.nombre,
            apellidos: h.alumnos.apellidos,
            codigo_usuario: h.alumnos.codigo_usuario,
            curso: h.curso,
            grupo: h.grupo,
            beca: h.beca,
            socio_ampa: h.socio_ampa
        }));
        
        // Filtrar por código de usuario (SIEMPRE como string)
        if (codigoRaw) {
            resultados = resultados.filter(a => {
                const codigoAlumno = a.codigo_usuario ? String(a.codigo_usuario) : '';
                return codigoAlumno.includes(codigoRaw);
            });
        }
        
        // Filtrar por nombre
        if (nombreBusq) {
            resultados = resultados.filter(a => normalizarTexto(a.nombre || '').includes(nombreBusq));
        }
        
        // Filtrar por apellidos
        if (apellidosBusq) {
            resultados = resultados.filter(a => normalizarTexto(a.apellidos || '').includes(apellidosBusq));
        }
        
        // Filtrar por curso
        if (cursoFiltro) {
            resultados = resultados.filter(a => a.curso === cursoFiltro);
        }
        
        // Mostrar resultados o mensaje
        if (resultados.length === 0) {
            resultadosDiv.innerHTML = `
                <p>No se encontraron alumnos</p>
                <button id="btnCrearDesdeBusqueda" class="success">➕ Crear nuevo alumno</button>
            `;
            const btnCrear = document.getElementById('btnCrearDesdeBusqueda');
            if (btnCrear) {
                btnCrear.onclick = function() { editarAlumno(null); };
            }
            return;
        }
        
        // Mostrar resultados
        let html = `<h3>Resultados (${resultados.length})</h3>`;
        for (const alumno of resultados) {
            html += `
                <div class="alumno-row" onclick="window.editarAlumno(${alumno.id})">
                    <div class="alumno-info">
                        <strong>${alumno.nombre} ${alumno.apellidos || ''}</strong><br>
                        📋 Código: ${alumno.codigo_usuario || 'Sin código'} | Curso: ${alumno.curso || '-'} ${alumno.grupo || ''}<br>
                        ${alumno.beca ? '🎓 Becado | ' : ''}${alumno.socio_ampa ? '💰 Socio AMPA' : ''}
                    </div>
                    <div class="alumno-actions">
                        <span class="edit-icon" onclick="event.stopPropagation(); window.editarAlumno(${alumno.id})">✏️</span>
                    </div>
                </div>
            `;
        }
        resultadosDiv.innerHTML = html;
    }
    
    window.editarAlumno = async (alumnoId) => {
        currentEditingAlumnoId = alumnoId;
        let alumno = null;
        let historialActual = null;
        
        if(alumnoId) {
            const { data: a } = await supabase.from('alumnos').select('*').eq('id', alumnoId).single();
            alumno = a;
            const { data: h } = await supabase.from('historial_alumnos').select('*').eq('alumno_id', alumnoId).eq('ano_academico_id', currentAnoId).maybeSingle();
            historialActual = h;
        }
        
        const { data: prestamos } = alumnoId ? await supabase.from('prestamos').select('*, libros(*)').eq('alumno_id', alumnoId).eq('entregado', false) : { data: [] };
        
        let html = `<div class="card">
            <h2>${alumnoId ? '✏️ Editando: ' + (alumno?.nombre || '') : '➕ Nuevo Alumno'}</h2>
            <div class="form-grid">
                <div><label>Nombre</label><input id="editNombre" value="${alumno?.nombre || ''}"></div>
                <div><label>Apellidos</label><input id="editApellidos" value="${alumno?.apellidos || ''}"></div>
                <div><label>Código de usuario</label><input id="editCodigo" value="${alumno?.codigo_usuario || 'Se generará automáticamente al guardar'}" disabled style="background:#f0f0f0;"></div>
                <div><label>Curso</label><select id="editCurso"><option>1ESO</option><option>2ESO</option><option>3ESO</option><option>4ESO</option><option>1BAC</option><option>2BAC</option></select></div>
                <div><label>Grupo</label><input id="editGrupo" value="${historialActual?.grupo || ''}"></div>
                <div><label>Teléfono</label><input id="editTelefono" value="${historialActual?.telefono || ''}"></div>
                <div><label><input type="checkbox" id="editDiversificacion" ${historialActual?.diversificacion ? 'checked' : ''}> Diversificación</label></div>                
                <div><label><input type="checkbox" id="editBilingue" ${historialActual?.bilingue ? 'checked' : ''}> Bilingüe</label></div>
                <div><label><input type="checkbox" id="editBeca" ${historialActual?.beca ? 'checked' : ''}> Beca</label></div>
                <div><label>Socio AMPA</label><input type="text" id="editSocioDisplay" value="${historialActual?.socio_ampa ? 'Sí' : 'No'}" disabled style="background:#f0f0f0;"></div>
                <div><label>Donante</label><input type="text" id="editDonanteDisplay" value="${historialActual?.donante ? 'Sí' : 'No'}" disabled style="background:#f0f0f0;"></div>
                <div><label>Observaciones</label><textarea id="editObservaciones">${historialActual?.observaciones || ''}</textarea></div>
            </div>
            <div style="background:#fef3c7; padding:12px; border-radius:12px; margin:12px 0;">
                <small>📌 Nota: Socio AMPA y Donante se editan desde las secciones "SOCIOS AMPA" y "BIBLIOTECA" respectivamente.</small>
            </div>
            <h3>📚 Libros Prestados</h3>
            <div id="prestamosLista">${prestamos?.map(p => `<div>📖 ${p.libros?.titulo} <button onclick="window.devolverLibroRapido(${p.id})">Devolver</button></div>`).join('') || '<p>Sin préstamos activos</p>'}</div>
            <div class="flex">
                <button id="guardarAlumnoBtn">💾 Guardar</button>
                ${alumnoId ? '<button id="imprimirAlumnoBtn" class="secondary">🖨️ Imprimir ficha</button>' : ''}
                ${alumnoId ? '<button id="bajaAlumnoBtn" class="danger">🗑️ Dar de baja</button>' : ''}
                <button class="secondary" onclick="window.cargarAlumnos()">Cancelar</button>
            </div>
        </div>`;
        document.getElementById('mainPanel').innerHTML = html;
        
        if(document.getElementById('editCurso')) document.getElementById('editCurso').value = historialActual?.curso || '1ESO';
        
        document.getElementById('guardarAlumnoBtn').onclick = async () => {
            let nuevoAlumnoId = alumnoId;
            
            if(!alumnoId) {
                // 1. Crear el alumno
                const { data: nuevo, error } = await supabase.from('alumnos').insert({ 
                    nombre: document.getElementById('editNombre').value,
                    apellidos: document.getElementById('editApellidos').value
                }).select().single();
                if(error) { alert('Error: ' + error.message); return; }
                nuevoAlumnoId = nuevo.id;
                
                // 2. Crear su historial para el año activo
                const historialDataCompleto = {
                    alumno_id: nuevoAlumnoId,
                    ano_academico_id: currentAnoId,
                    curso: document.getElementById('editCurso').value,
                    grupo: document.getElementById('editGrupo').value || '',
                    telefono: document.getElementById('editTelefono').value || '',
                    bilingue: document.getElementById('editBilingue').checked,
                    beca: document.getElementById('editBeca').checked,
                    socio_ampa: false,
                    diversificacion: document.getElementById('editDiversificacion').checked,
                    donante: false,
                    observaciones: document.getElementById('editObservaciones').value || '',
                    activo: true
                };
                const { error: histError } = await supabase.from('historial_alumnos').insert(historialDataCompleto);
                if(histError) console.error("Error al crear historial:", histError);
                
                alert(`Alumno creado con código: ${nuevo.codigo_usuario}`);
                cargarAlumnos();
                return;
            }
            
            // Si es edición (alumno ya existe)
            await supabase.from('alumnos').update({ 
                nombre: document.getElementById('editNombre').value,
                apellidos: document.getElementById('editApellidos').value
            }).eq('id', alumnoId);
            
            const historialData = {
                curso: document.getElementById('editCurso').value,
                grupo: document.getElementById('editGrupo').value,
                telefono: document.getElementById('editTelefono').value,
                bilingue: document.getElementById('editBilingue').checked,
                beca: document.getElementById('editBeca').checked,
                socio_ampa: historialActual?.socio_ampa || false,
                diversificacion: document.getElementById('editDiversificacion').checked,
                donante: historialActual?.donante || false,
                observaciones: document.getElementById('editObservaciones').value,
                activo: true
            };
            
            if (historialActual?.id) {
                await supabase.from('historial_alumnos').update(historialData).eq('id', historialActual.id);
            } else {
                await supabase.from('historial_alumnos').insert({
                    alumno_id: alumnoId,
                    ano_academico_id: currentAnoId,
                    ...historialData
                });
            }
            alert('Alumno guardado');
            cargarAlumnos();
        };
        
        if(document.getElementById('imprimirAlumnoBtn')) {
            document.getElementById('imprimirAlumnoBtn').onclick = () => {
                const ventana = window.open('', '_blank');
                ventana.document.write(`
                    <html>
                    <head><title>Ficha de ${alumno?.nombre}</title></head>
                    <body style="font-family:sans-serif; padding:20px;">
                        <h1>Ficha de Alumno</h1>
                        <p><strong>Código:</strong> ${alumno?.codigo_usuario}</p>
                        <p><strong>Nombre:</strong> ${alumno?.nombre} ${alumno?.apellidos || ''}</p>
                        <p><strong>Curso:</strong> ${historialActual?.curso} ${historialActual?.grupo || ''}</p>
                        <p><strong>Teléfono:</strong> ${historialActual?.telefono || '-'}</p>
                        <p><strong>Bilingüe:</strong> ${historialActual?.bilingue ? 'Sí' : 'No'}</p>
                        <p><strong>Beca:</strong> ${historialActual?.beca ? 'Sí' : 'No'}</p>
                        <p><strong>Socio AMPA:</strong> ${historialActual?.socio_ampa ? 'Sí' : 'No'}</p>
                        <p><strong>Donante:</strong> ${historialActual?.donante ? 'Sí' : 'No'}</p>
                        <p><strong>Observaciones:</strong> ${historialActual?.observaciones || '-'}</p>
                        <hr>
                        <p>Fecha impresión: ${new Date().toLocaleString()}</p>
                    </body>
                    </html>
                `);
                ventana.document.close();
            };
        }
        
        if(document.getElementById('bajaAlumnoBtn')) {
            document.getElementById('bajaAlumnoBtn').onclick = () => {
                if(confirm('¿Dar de baja a este alumno? Se conservará el historial.')) {
                    const motivo = prompt('Motivo de la baja:');
                    if(motivo) {
                        supabase.from('bajas_alumnos').insert({ alumno_id: alumnoId, motivo: motivo });
                        supabase.from('historial_alumnos').update({ activo: false }).eq('alumno_id', alumnoId).eq('ano_academico_id', currentAnoId);
                        alert('Alumno dado de baja');
                        cargarAlumnos();
                    }
                }
            };
        }
    };
    
    window.devolverLibroRapido = async (prestamoId) => {
        await supabase.from('prestamos').update({ entregado: true, fecha_devolucion: new Date().toISOString().slice(0,10) }).eq('id', prestamoId);
        alert('Libro devuelto');
        if(currentEditingAlumnoId) window.editarAlumno(currentEditingAlumnoId);
        else cargarAlumnos();
    };
    
    // ==================== SOCIOS ====================
    // ==================== SOCIOS AMPA (MEJORADO) ====================
    async function cargarSocios() {
        let html = `
            <div class="card">
                <div class="flex"><h2>💰 Socios AMPA</h2></div>
                <div class="search-filters">
                    <div class="form-grid">
                        <div><label>🔍 Buscar socio</label><input type="text" id="searchSocioInput" placeholder="Nombre, apellidos o código de usuario..."></div>
                    </div>
                    <button id="btnBuscarSocio">Buscar</button>
                    <button id="btnLimpiarSocio" class="secondary">Limpiar</button>
                </div>
                <div id="resultadosSocios" class="resultados">
                    <p style="color:#64748b; text-align:center;">🔎 Usa el buscador para encontrar socios</p>
                </div>
            </div>
        `;
        document.getElementById('mainPanel').innerHTML = html;
        

        document.getElementById('btnBuscarSocio').onclick = () => buscarSocios();

    async function buscarSocios() {
        const searchTerm = document.getElementById('searchSocioInput').value.trim();
        const resultadosDiv = document.getElementById('resultadosSocios');
        
        if (!searchTerm) {
            resultadosDiv.innerHTML = '<p style="color:#64748b; text-align:center;">Escribe algo para buscar</p>';
            return;
        }
        
        resultadosDiv.innerHTML = '<p>Buscando...</p>';
        
        // Buscar alumnos por nombre, apellidos o código
        let query = supabase.from('alumnos').select('*');
        
        if (!isNaN(searchTerm) && searchTerm !== '') {
            query = query.eq('codigo_usuario', parseInt(searchTerm));
        } else {
            query = query.or(`nombre.ilike.%${searchTerm}%,apellidos.ilike.%${searchTerm}%`);
        }
        
        const { data: alumnos, error } = await query;
        
        if (error) {
            resultadosDiv.innerHTML = `<p>Error: ${error.message}</p>`;
            return;
        }
        
        if (!alumnos || alumnos.length === 0) {
            resultadosDiv.innerHTML = '<p>No se encontraron alumnos</p>';
            return;
        }
        
        let html = `<h3>Resultados (${alumnos.length})</h3>`;
        
        for (const alumno of alumnos) {
            // Verificar si es socio este año
            const { data: socio } = await supabase
                .from('socios')
                .select('*')
                .eq('alumno_id', alumno.id)
                .eq('ano_academico_id', currentAnoId)
                .maybeSingle();
            
            const esSocio = socio && socio.activo !== false;
            const haPagado = socio?.pagado || false;
            
            html += `
                <div class="alumno-row">
                    <div class="alumno-info">
                        <strong>${alumno.nombre} ${alumno.apellidos || ''}</strong><br>
                        📋 Código: ${alumno.codigo_usuario || 'Sin código'}<br>
                        ${esSocio ? (haPagado ? '✅ Socio - Pago registrado' : '⚠️ Socio - Pago pendiente') : '❌ No es socio'}
                        ${socio ? `<br>📅 Fecha pago: ${socio.fecha_pago || 'No registrada'}` : ''}
                    </div>
                    <div class="alumno-actions">
                        ${!esSocio ? `<button onclick="window.registrarPagoSocio(${alumno.id})">➕ Hacer socio</button>` : ''}
                        ${esSocio ? `<button onclick="window.editarPagoSocio(${socio.id}, ${alumno.id})">✏️ Editar pago</button>` : ''}
                        ${esSocio ? `<button class="danger" onclick="window.darBajaSocio(${socio.id}, ${alumno.id})">🗑️ Dar baja socio</button>` : ''}
                    </div>
                </div>
            `;
        }
        resultadosDiv.innerHTML = html;
    }

    async function procesarISBN(codigo) {
        // Aquí puedes llamar a una API para obtener datos del ISBN
        // Por ahora, rellenamos manualmente
        const titulo = prompt("ISBN escaneado: " + codigo + "\nIntroduce el título del libro:");
        if (!titulo) return;
        
        const materia = prompt("Materia (Ej: Matemáticas):");
        if (!materia) return;
        
        const curso = prompt("Curso (1ESO, 2ESO, etc.):");
        
        // Generar signatura automática
        const { data: ultimoLibro } = await supabase
            .from('libros')
            .select('signatura')
            .not('signatura', 'is', null)
            .order('signatura', { ascending: false })
            .limit(1);
        
        let ultimoNumero = 0;
        if (ultimoLibro && ultimoLibro[0]?.signatura) {
            const match = ultimoLibro[0].signatura.match(/(\d+)$/);
            if (match) ultimoNumero = parseInt(match[1]);
        }
        const nuevoNumero = ultimoNumero + 1;
        const signatura = `${materia.substring(0,3).toUpperCase()}-${curso?.substring(0,1) || '1'}-${String(nuevoNumero).padStart(3, '0')}`;
        
        const { error } = await supabase.from('libros').insert({
            codigo_barras: codigo,
            titulo: titulo,
            materia: materia,
            curso_para: curso,
            signatura: signatura,
            estado: 'nuevo',
            origen: 'IES'
        });
        
        if(error) {
            alert('Error: ' + error.message);
        } else {
            alert(`✅ Libro "${titulo}" añadido correctamente\nSignatura: ${signatura}`);
            buscarLibros();
        }
    }    
    
    
    async function buscarLibros() {
        const searchTerm = document.getElementById('searchLibroInput').value.trim();
        const materia = document.getElementById('filtroMateria').value.trim();
        const curso = document.getElementById('filtroCurso').value;
        const editorial = document.getElementById('filtroEditorial').value.trim();
        const estado = document.getElementById('filtroEstado').value;
        const origen = document.getElementById('filtroOrigen').value;
        
        const resultadosDiv = document.getElementById('resultadosLibros');
        resultadosDiv.innerHTML = '<p>Buscando...</p>';
        console.log("Filtros aplicados:", { searchTerm, materia, curso, editorial, estado, origen });
        let query = supabase.from('libros').select('*');
        
        if (searchTerm) {
            query = query.or(`titulo.ilike.%${searchTerm}%,signatura.ilike.%${searchTerm}%,codigo_barras.ilike.%${searchTerm}%`);
        }
        if (materia) query = query.ilike('materia', `%${materia}%`);
        if (curso) query = query.eq('curso_para', curso);
        if (editorial) query = query.ilike('editorial', `%${editorial}%`);
        if (estado) query = query.eq('estado', estado);
        if (origen) query = query.eq('origen', origen);
        
        const { data: libros, error } = await query.order('created_at', { ascending: false });
        
        if (error) {
            resultadosDiv.innerHTML = `<p>Error: ${error.message}</p>`;
            return;
        }
        
        if (!libros || libros.length === 0) {
            resultadosDiv.innerHTML = '<p>No se encontraron libros</p>';
            return;
        }
        
        let html = `<h3>Resultados (${libros.length})</h3>`;
        

        for (const libro of libros) {
            console.log("Libro:", libro);  // <--- AÑADE ESTA LÍNEA
            
            // Verificar si está prestado
            const { data: prestamo } = await supabase
                .from('prestamos')
                .select('*, alumnos(*)')
                .eq('libro_codigo', libro.codigo_barras)
                .eq('entregado', false)
                .maybeSingle();
            
            const estadoPrestamo = prestamo ? `🔴 Prestado a: ${prestamo.alumnos?.nombre}` : '🟢 Disponible';
            
            html += `
                <div class="alumno-row">
                    <div class="alumno-info">
                        <strong>${libro.titulo}</strong><br>
                        📖 Signatura: ${libro.signatura || 'Sin asignar'} | Código: ${libro.codigo_barras}<br>
                        📚 Materia: ${libro.materia || '-'} | Curso: ${libro.curso_para || '-'}<br>
                        🏢 Editorial: ${libro.editorial || '-'} | Estado: ${libro.estado || 'nuevo'}<br>
                        🏷️ Origen: ${libro.origen || 'IES'} | ${estadoPrestamo}
                    </div>
                    <div class="alumno-actions">
                        <button onclick="window.editarLibro('${libro.codigo_barras}')">✏️ Editar</button>
                        ${prestamo ? `<button class="secondary" onclick="window.verPrestamoLibro('${libro.codigo_barras}')">👤 Ver quién lo tiene</button>` : ''}
                    </div>
                </div>
            `;
        }
        resultadosDiv.innerHTML = html;
    }

            const crear = confirm("Libro no encontrado. ¿Quieres crearlo ahora?");

                    alert(`✅ Libro "${nuevoLibro.titulo}" añadido al lote`);
                    actualizarListaLotePrestamo();
                }
            }
        } else {
            // Verificar si el libro ya está prestado
            const { data: prestado } = await supabase
                .from('prestamos')
                .select('id')
                .eq('libro_codigo', libro.codigo_barras)
                .eq('entregado', false)
                .maybeSingle();
            
            if (prestado) {
                alert(`⚠️ El libro "${libro.titulo}" ya está prestado a otro alumno`);
            } else {
                loteTemporalPrestamo.push(libro);
                alert(`📚 Añadido: ${libro.titulo} (Total: ${loteTemporalPrestamo.length})`);
                actualizarListaLotePrestamo();
            }
        }

    // ==================== ESCÁNER ====================
    function abrirScanner() {
        if (scannerActivo) return;
        document.getElementById("scannerModal").style.display = "block";
        if (!html5QrCode) html5QrCode = new Html5Qrcode("qr-reader");
        scannerActivo = true;
        html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 250, height: 250 } },
            (texto) => {
                if (html5QrCode && html5QrCode.isScanning) {
                    html5QrCode.stop().then(() => {
                        scannerActivo = false;
                        document.getElementById("scannerModal").style.display = "none";
                        procesarEscaneo(texto);
                    }).catch(() => {
                        scannerActivo = false;
                        document.getElementById("scannerModal").style.display = "none";
                        procesarEscaneo(texto);
                    });
                } else {
                    scannerActivo = false;
                    document.getElementById("scannerModal").style.display = "none";
                    procesarEscaneo(texto);
                }
            },
            (error) => {}
        ).catch(err => {
            alert("Error cámara: " + err);
            cerrarScanner();
        });
    }
    function normalizarTexto(texto) {
        if (!texto) return '';
        return texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
    }    
    function cerrarScanner() {
        scannerActivo = false;
        if (html5QrCode && html5QrCode.isScanning) {
            try {
                html5QrCode.stop();
            } catch(e) {}
        }
        document.getElementById("scannerModal").style.display = "none";
    }
    
    async function procesarEscaneo(codigo) {
        if (modoActual === "prestamo_rapido") {
            // Escaneo de alumno (por código de usuario)
            const { data: alumno } = await supabase.from('alumnos').select('*').eq('codigo_usuario', parseInt(codigo)).maybeSingle();
            if(alumno) {
                window.editarAlumno(alumno.id);
                alert(`Alumno: ${alumno.nombre}`);
            } else {
                alert('Código de alumno no reconocido');
            }
        }
        else if (modoActual === "prestar_libro_lote") {
            await procesarLibroParaLote(codigo);
        }
        else if (modoActual === "devolucion_libro") {
            await procesarDevolucionLibro(codigo);
        }
            
        else if (modoActual === "escanear_libro") {
            // Escaneo para añadir nuevo libro
            await procesarNuevoLibroConEscanner(codigo);
        }
        else if (modoActual === "prestar_libro") {
            // Escaneo para prestar libro a un alumno
            const { data: libro } = await supabase.from('libros').select('*').eq('codigo_barras', codigo).maybeSingle();
            if(!libro) {
                const crear = confirm("Libro no encontrado. ¿Quieres crearlo ahora?");
                if(crear) {
                    await procesarNuevoLibroConEscanner(codigo);
                    const { data: nuevoLibro } = await supabase.from('libros').select('*').eq('codigo_barras', codigo).single();
                    if(nuevoLibro && currentEditingAlumnoId) {
                        await supabase.from('prestamos').insert({
                            libro_codigo: codigo,
                            alumno_id: currentEditingAlumnoId,
                            fecha_prestamo: new Date().toISOString().slice(0,10),
                            ano_academico_id: currentAnoId,
                            entregado: false
                        });
                        alert("✅ Libro creado y prestado correctamente");
                        window.editarAlumno(currentEditingAlumnoId);
                    }
                }
            } else {
                const { error } = await supabase.from('prestamos').insert({
                    libro_codigo: libro.codigo_barras,
                    alumno_id: currentEditingAlumnoId,
                    fecha_prestamo: new Date().toISOString().slice(0,10),
                    ano_academico_id: currentAnoId,
                    entregado: false
                });
                if(error) {
                    alert('Error al prestar: ' + error.message);
                } else {
                    alert(`✅ Libro "${libro.titulo}" prestado correctamente`);
                    window.editarAlumno(currentEditingAlumnoId);
                }
            }
        }
        modoActual = "";
    }

    async function cargarEstadisticas() {

        let filtroAlumnos = `eq(ano_academico_id,${currentAnoId})`;

        if (grupo) filtroAlumnos += `&eq(grupo,${grupo})`;
        
        // 1. Total alumnos activos este año
        const { count: totalAlumnos } = await supabase
            .from('historial_alumnos')
            .select('*', { count: 'exact', head: true })
            .eq('ano_academico_id', currentAnoId)
            .eq('activo', true);
        
        // 2. Alumnos becados
        let queryBecados = supabase
            .from('historial_alumnos')
            .select('*', { count: 'exact', head: true })
            .eq('ano_academico_id', currentAnoId)
            .eq('beca', true);
        if (curso) queryBecados = queryBecados.eq('curso', curso);

            .from('historial_alumnos')
            .select('*', { count: 'exact', head: true })
            .eq('ano_academico_id', currentAnoId)
            .eq('bilingue', true);
        if (curso) queryBilingue = queryBilingue.eq('curso', curso);
        const { count: alumnosBilingues } = await queryBilingue;
        
        // 4. Socios AMPA
        const { count: totalSocios } = await supabase
            .from('socios')
            .select('*', { count: 'exact', head: true })
            .eq('ano_academico_id', currentAnoId)
            .eq('activo', true);

            .eq('ano_academico_id', currentAnoId)
            .eq('pagado', false)
            .eq('activo', true);
        
        // 6. Total libros en biblioteca
        const { count: totalLibros } = await supabase
            .from('libros')
            .select('*', { count: 'exact', head: true });
        
        // 7. Préstamos activos (no devueltos)
        const { count: prestamosActivos } = await supabase
            .from('prestamos')
            .select('*', { count: 'exact', head: true })
            .eq('entregado', false);
        
        // 8. Alumnos donantes
        let queryDonantes = supabase
            .from('historial_alumnos')
            .select('*', { count: 'exact', head: true })
            .eq('ano_academico_id', currentAnoId)
            .eq('donante', true);
        if (curso) queryDonantes = queryDonantes.eq('curso', curso);
        const { count: alumnosDonantes } = await queryDonantes;
        
        // 9. Alumnos con observaciones (problemas)
        let queryProblemas = supabase
            .from('historial_alumnos')
            .select('*', { count: 'exact', head: true })
            .eq('ano_academico_id', currentAnoId)
            .not('observaciones', 'is', null)
            .neq('observaciones', '');
        if (curso) queryProblemas = queryProblemas.eq('curso', curso);
        const { count: alumnosProblemas } = await queryProblemas;
        
        // 10. Libros por estado
        const { data: librosEstado } = await supabase
            .from('libros')
            .select('estado, count')
            .select('estado');
        
        let html = `
            <div class="card" style="text-align:center; background:#eff6ff;">
                <h3>📊 Estadísticas ${curso ? '· Curso: ' + curso : ''}${grupo ? '· Grupo: ' + grupo : ''}</h3>
            </div>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px;">
                <div class="card" style="text-align:center;"><h3>👨‍🎓 ${totalAlumnos || 0}</h3><p>Alumnos activos</p></div>
                <div class="card" style="text-align:center;"><h3>🎓 ${alumnosBecados || 0}</h3><p>Becados</p></div>
                <div class="card" style="text-align:center;"><h3>🌍 ${alumnosBilingues || 0}</h3><p>Bilingües</p></div>
                <div class="card" style="text-align:center;"><h3>💰 ${totalSocios || 0}</h3><p>Socios AMPA</p></div>
                <div class="card" style="text-align:center;"><h3>⏳ ${sociosPendientes || 0}</h3><p>Socios pendientes pago</p></div>
                <div class="card" style="text-align:center;"><h3>📖 ${totalLibros || 0}</h3><p>Libros en biblioteca</p></div>
                <div class="card" style="text-align:center;"><h3>🔄 ${prestamosActivos || 0}</h3><p>Préstamos activos</p></div>
                <div class="card" style="text-align:center;"><h3>📦 ${alumnosDonantes || 0}</h3><p>Donantes</p></div>
                <div class="card" style="text-align:center;"><h3>⚠️ ${alumnosProblemas || 0}</h3><p>Con observaciones</p></div>
            </div>
        `;
        
        document.getElementById('informesTarjetas').innerHTML = html;
    }
    
    async function listarAlumnosBecados() {

        const { data: alumnos } = await supabase
            .from('historial_alumnos')

            container.innerHTML = '<p>No hay alumnos becados</p>';
