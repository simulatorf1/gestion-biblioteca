<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 600px; margin: 0 auto; }
        button { background: #007bff; color: white; border: none; padding: 12px 20px; margin: 5px; border-radius: 8px; cursor: pointer; }
        .card { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-top: 20px; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; }
        .libro { background: white; padding: 10px; margin: 5px 0; border-left: 4px solid #007bff; border-radius: 5px; }
        .tachado { text-decoration: line-through; opacity: 0.6; }
        #scannerModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 1000; padding: 20px; }
        #qr-reader { width: 100%; margin-top: 50px; }
    </style>
</head>
<body>
    <h1>📚 Biblioteca</h1>
    <div>
        <button id="btnLote">📦 Escanear LOTE</button>
        <button id="btnDevo">🔄 Escanear DEVOLUCIÓN</button>
        <button id="btnLista">⏳ Préstamos</button>
        <button id="btnBuscar">🔍 Buscar alumno</button>
    </div>
    <div id="panel" class="card"><p>Selecciona una opción</p></div>
    <div id="scannerModal">
        <button id="btnCerrar" style="background:white;color:black;">✖ Cerrar</button>
        <div id="qr-reader"></div>
    </div>

    <script>
        // CONFIGURACIÓN - CAMBIA SOLO ESTAS DOS LÍNEAS
        const SUPABASE_URL = "https://klwrclwbzvupqxcxljst.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtsd3JjbHdienZ1cHF4Y3hsanN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MjExMTMsImV4cCI6MjA5NDM5NzExM30.GdcE2wSREkSt6DHjjs7L5MxYobdNZsz6wAvI_XvsGVk";
        
        const supabase = supabase_js.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let scanner = null;
        let modo = "";
        let lote = [];
        let devoAlumno = null;
        let devoLibros = [];

        function panel(html) { 
            document.getElementById("panel").innerHTML = html; 
        }

        function abrirScanner(modoNuevo) {
            modo = modoNuevo;
            document.getElementById("scannerModal").style.display = "block";
            if (!scanner) {
                scanner = new Html5Qrcode("qr-reader");
            }
            scanner.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: 250 },
                function(texto) { 
                    scanner.stop(); 
                    cerrarScanner(); 
                    procesar(texto); 
                },
                function() {}
            ).catch(function(e) { 
                alert("Error cámara: " + e); 
                cerrarScanner(); 
            });
        }

        function cerrarScanner() {
            if (scanner && scanner.isScanning) {
                scanner.stop();
            }
            document.getElementById("scannerModal").style.display = "none";
        }

        async function procesar(codigo) {
            let { data: libro } = await supabase
                .from("libros")
                .select("*")
                .eq("codigo_barras", codigo)
                .maybeSingle();
            
            if (!libro) {
                let titulo = prompt("Nuevo libro. Título:");
                if (!titulo) return;
                let { data: nuevo } = await supabase
                    .from("libros")
                    .insert({ codigo_barras: codigo, titulo: titulo })
                    .select()
                    .single();
                libro = nuevo;
                alert("✅ Libro añadido: " + titulo);
            }
            
            if (modo === "lote") {
                if (!lote.find(function(l) { return l.codigo_barras === libro.codigo_barras; })) {
                    lote.push(libro);
                    alert("Añadido: " + libro.titulo + " (Total: " + lote.length + ")");
                } else {
                    alert("Ya está en el lote");
                }
                mostrarLote();
            } else if (modo === "devo") {
                await procesarDevo(libro);
            }
        }

        function mostrarLote() {
            let html = '<h2>📦 LOTE (' + lote.length + ')</h2>';
            html += '<button id="escanearLote">📷 Escanear</button>';
            html += '<button id="cancelarLote" class="secondary">Cancelar</button>';
            
            if (lote.length > 0) {
                for (var i = 0; i < lote.length; i++) {
                    html += '<div class="libro">📖 ' + lote[i].titulo + '</div>';
                }
                html += '<hr>';
                html += '<input id="nombreAlumno" placeholder="Nombre alumno">';
                html += '<input id="cursoAlumno" placeholder="Curso">';
                html += '<button id="asignarLote">✅ Asignar ' + lote.length + ' libros</button>';
            }
            
            html += '<button id="volverLote">← Volver</button>';
            panel(html);
            
            document.getElementById("escanearLote").onclick = function() { abrirScanner("lote"); };
            document.getElementById("cancelarLote").onclick = function() { lote = []; mostrarLote(); };
            if (document.getElementById("asignarLote")) {
                document.getElementById("asignarLote").onclick = asignarLote;
            }
            document.getElementById("volverLote").onclick = menu;
        }

        async function asignarLote() {
            var nombre = document.getElementById("nombreAlumno").value.trim();
            if (!nombre) { alert("Nombre requerido"); return; }
            var curso = document.getElementById("cursoAlumno").value;
            
            var { data: alumno } = await supabase
                .from("alumnos")
                .select("id")
                .eq("nombre", nombre)
                .maybeSingle();
            
            if (!alumno) {
                var { data: nuevo } = await supabase
                    .from("alumnos")
                    .insert({ nombre: nombre, curso: curso })
                    .select()
                    .single();
                alumno = nuevo;
            }
            
            for (var i = 0; i < lote.length; i++) {
                await supabase.from("prestamos").insert({
                    libro_codigo: lote[i].codigo_barras,
                    alumno_id: alumno.id,
                    fecha_prestamo: new Date().toISOString().slice(0,10)
                });
            }
            
            alert("✅ " + lote.length + " libros a " + nombre);
            lote = [];
            menu();
        }

        function iniciarDevolucion() {
            devoAlumno = null;
            modo = "devo";
            var html = '<h2>🔄 Devolución</h2>';
            html += '<p>Escanea el primer libro</p>';
            html += '<button id="primerLibro">📷 Escanear</button>';
            html += '<button id="cancelarDevo" class="secondary">Cancelar</button>';
            panel(html);
            document.getElementById("primerLibro").onclick = function() { abrirScanner("devo"); };
            document.getElementById("cancelarDevo").onclick = menu;
        }

        async function procesarDevo(libro) {
            if (!devoAlumno) {
                var { data: prestamo } = await supabase
                    .from("prestamos")
                    .select("*, alumnos(*)")
                    .eq("libro_codigo", libro.codigo_barras)
                    .eq("entregado", false)
                    .maybeSingle();
                
                if (!prestamo) { 
                    alert("No está prestado"); 
                    iniciarDevolucion(); 
                    return; 
                }
                
                devoAlumno = prestamo.alumnos;
                
                var { data: prestamos } = await supabase
                    .from("prestamos")
                    .select("*, libros(*)")
                    .eq("alumno_id", devoAlumno.id)
                    .eq("entregado", false);
                
                devoLibros = [];
                for (var i = 0; i < prestamos.length; i++) {
                    devoLibros.push({
                        id: prestamos[i].id,
                        codigo: prestamos[i].libros.codigo_barras,
                        titulo: prestamos[i].libros.titulo,
                        devuelto: false
                    });
                }
                
                var encontrado = null;
                for (var j = 0; j < devoLibros.length; j++) {
                    if (devoLibros[j].codigo === libro.codigo_barras) {
                        encontrado = devoLibros[j];
                        break;
                    }
                }
                if (encontrado) {
                    await supabase.from("prestamos").update({ entregado: true, fecha_devolucion: new Date().toISOString().slice(0,10) }).eq("id", encontrado.id);
                    encontrado.devuelto = true;
                }
                
                mostrarListaDevo();
            } else {
                var encontrado = null;
                for (var k = 0; k < devoLibros.length; k++) {
                    if (devoLibros[k].codigo === libro.codigo_barras) {
                        encontrado = devoLibros[k];
                        break;
                    }
                }
                if (encontrado && !encontrado.devuelto) {
                    await supabase.from("prestamos").update({ entregado: true, fecha_devolucion: new Date().toISOString().slice(0,10) }).eq("id", encontrado.id);
                    encontrado.devuelto = true;
                    alert("Devuelto: " + libro.titulo);
                    mostrarListaDevo();
                } else if (encontrado && encontrado.devuelto) {
                    alert("Ya devuelto");
                } else {
                    alert("Este libro no pertenece a " + devoAlumno.nombre);
                }
            }
        }

        function mostrarListaDevo() {
            var todos = true;
            for (var i = 0; i < devoLibros.length; i++) {
                if (!devoLibros[i].devuelto) {
                    todos = false;
                    break;
                }
            }
            
            var html = '<h2>🔄 Devolviendo: ' + devoAlumno.nombre + '</h2>';
            html += '<p>Curso: ' + (devoAlumno.curso || "-") + '</p>';
            html += '<h3>Libros:</h3>';
            
            if (todos) {
                html += '<p>✅ Todos devueltos</p>';
                html += '<button id="finDevo">Finalizar</button>';
            } else {
                html += '<button id="siguienteDevo">📷 Escanear</button>';
                for (var j = 0; j < devoLibros.length; j++) {
                    var clase = devoLibros[j].devuelto ? "tachado" : "";
                    html += '<div class="libro ' + clase + '">📖 ' + devoLibros[j].titulo + ' ' + (devoLibros[j].devuelto ? '✅' : '⏳') + '</div>';
                }
            }
            html += '<button id="cancelarDevo2" class="secondary">Cancelar</button>';
            panel(html);
            
            if (!todos) {
                document.getElementById("siguienteDevo").onclick = function() { abrirScanner("devo"); };
            } else {
                document.getElementById("finDevo").onclick = function() { devoAlumno = null; menu(); };
            }
            document.getElementById("cancelarDevo2").onclick = function() { devoAlumno = null; menu(); };
        }

        async function mostrarLista() {
            var { data: pendientes } = await supabase.from("prestamos_activos").select("*").order("alumno");
            if (!pendientes || pendientes.length === 0) {
                panel('<h2>✅ No hay préstamos</h2><button id="volverLista">Volver</button>');
                document.getElementById("volverLista").onclick = menu;
                return;
            }
            var html = '<h2>📋 Préstamos (' + pendientes.length + ')</h2>';
            var ultimo = "";
            for (var i = 0; i < pendientes.length; i++) {
                var p = pendientes[i];
                if (p.alumno !== ultimo) {
                    if (ultimo !== "") html += '</div>';
                    html += '<div><strong>👤 ' + p.alumno + '</strong><div style="margin-left:15px;">';
                    ultimo = p.alumno;
                }
                html += '<div class="libro">📖 ' + p.libro + '</div>';
            }
            html += '</div></div><button id="volverLista">Volver</button>';
            panel(html);
            document.getElementById("volverLista").onclick = menu;
        }

        async function buscar() {
            var html = '<h2>🔍 Buscar</h2>';
            html += '<input id="nombreBuscar" placeholder="Nombre">';
            html += '<button id="btnBuscarNombre">Buscar</button>';
            html += '<button id="volverBuscar" class="secondary">Volver</button>';
            html += '<div id="resultados"></div>';
            panel(html);
            
            document.getElementById("btnBuscarNombre").onclick = async function() {
                var nombre = document.getElementById("nombreBuscar").value.trim();
                if (!nombre) return;
                var { data: alumnos } = await supabase.from("alumnos").select("*").ilike("nombre", "%" + nombre + "%");
                if (!alumnos || alumnos.length === 0) {
                    document.getElementById("resultados").innerHTML = "<p>No encontrado</p>";
                    return;
                }
                var resultadosHtml = "";
                for (var i = 0; i < alumnos.length; i++) {
                    var a = alumnos[i];
                    var { data: prestamos } = await supabase.from("prestamos_activos").select("*").eq("alumno", a.nombre);
                    resultadosHtml += '<div style="background:white; padding:10px; margin:5px; border-radius:5px;">';
                    resultadosHtml += '<strong>' + a.nombre + '</strong> (' + (a.curso || "-") + ')<br>';
                    resultadosHtml += '📚 ' + (prestamos?.length || 0) + ' libros';
                    resultadosHtml += '<button onclick="verLibros(' + a.id + ', \'' + a.nombre + '\')">Ver libros</button>';
                    resultadosHtml += '</div>';
                }
                document.getElementById("resultados").innerHTML = resultadosHtml;
            };
            document.getElementById("volverBuscar").onclick = menu;
        }

        window.verLibros = async function(id, nombre) {
            var { data: prestamos } = await supabase.from("prestamos_activos").select("*").eq("alumno", nombre);
            var html = '<h2>📚 ' + nombre + '</h2>';
            if (!prestamos || prestamos.length === 0) {
                html += "<p>No tiene libros</p>";
            } else {
                for (var i = 0; i < prestamos.length; i++) {
                    html += '<div class="libro">📖 ' + prestamos[i].libro + '</div>';
                }
            }
            html += '<button id="volverLibros">Volver</button>';
            panel(html);
            document.getElementById("volverLibros").onclick = buscar;
        };

        function menu() {
            modo = "";
            lote = [];
            devoAlumno = null;
            panel("<p>Selecciona una opción</p>");
        }

        // Conectar botones principales
        document.getElementById("btnLote").onclick = function() { lote = []; mostrarLote(); };
        document.getElementById("btnDevo").onclick = iniciarDevolucion;
        document.getElementById("btnLista").onclick = mostrarLista;
        document.getElementById("btnBuscar").onclick = buscar;
        document.getElementById("btnCerrar").onclick = cerrarScanner;
        
        menu();
    </script>
</body>
</html>
