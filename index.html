<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Banco de Libros</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .top-bar { background: white; border-radius: 16px; padding: 12px 24px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .year-selector { display: flex; align-items: center; gap: 12px; background: #f8fafc; padding: 8px 16px; border-radius: 40px; }
        .year-selector select { padding: 8px 12px; border-radius: 24px; border: 1px solid #cbd5e1; font-weight: bold; }
        .nav-tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 2px solid #e2e8f0; flex-wrap: wrap; }
        .nav-tab { padding: 12px 24px; background: transparent; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; border-radius: 12px 12px 0 0; color: #64748b; }
        .nav-tab.active { color: #2563eb; border-bottom: 3px solid #2563eb; background: #eff6ff; }
        .card { background: white; border-radius: 20px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        button { background: #2563eb; color: white; border: none; padding: 10px 18px; border-radius: 40px; font-weight: 500; cursor: pointer; font-size: 0.9rem; }
        button.secondary { background: #64748b; }
        button.danger { background: #dc2626; }
        button.success { background: #10b981; }
        .alumno-row { background: #f8fafc; padding: 16px; margin-bottom: 12px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; border-left: 4px solid #2563eb; cursor: pointer; }
        .alumno-row:hover { background: #e2e8f0; }
        .alumno-info { flex: 1; }
        .alumno-actions { display: flex; gap: 8px; }
        .edit-icon { cursor: pointer; font-size: 1.2rem; padding: 4px 8px; background: #e2e8f0; border-radius: 40px; display: inline-block; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 0.9rem; }
        label { font-weight: 500; display: block; margin-bottom: 4px; }
        .search-filters { background: #f8fafc; padding: 16px; border-radius: 16px; margin-bottom: 20px; }
        #scannerModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 10000; padding: 20px; }
        #qr-reader { width: 100%; margin-top: 60px; }
        .flex { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .resultados { max-height: 500px; overflow-y: auto; }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <h1 style="margin:0">📚 Banco de Libros</h1>
        <div class="year-selector">
            <span>📅 Año Académico:</span>
            <select id="selectAnoAcademico"></select>
            <span id="anoActivoBadge" style="background:#10b981; color:white; padding:4px 12px; border-radius:40px; font-size:0.8rem;">Activo</span>
        </div>
    </div>

    <div class="nav-tabs">
        <button class="nav-tab active" data-tab="alumnos">👨‍🎓 ALUMNOS</button>
        <button class="nav-tab" data-tab="socios">💰 SOCIOS AMPA</button>
        <button class="nav-tab" data-tab="biblioteca">📖 BIBLIOTECA</button>
        <button class="nav-tab" data-tab="informes">📊 INFORMES</button>
        <button class="nav-tab" data-tab="prestamos">🔄 PRÉSTAMOS</button>
    </div>

    <div id="mainPanel"></div>
</div>

<div id="scannerModal">
    <button id="btnCerrarScanner" style="background:white; color:black; width:auto;">✖ Cerrar</button>
    <div id="qr-reader"></div>
</div>

<script>
(function() {
    // ==================== CONFIGURACIÓN ====================
    const SUPABASE_URL = "https://klwrclwbzvupqxcxljst.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtsd3JjbHdienZ1cHF4Y3hsanN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MjExMTMsImV4cCI6MjA5NDM5NzExM30.GdcE2wSREkSt6DHjjs7L5MxYobdNZsz6wAvI_XvsGVk";
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let html5QrCode = null;
    let currentTab = 'alumnos';
    let currentAnoId = null;
    let currentEditingAlumnoId = null;
    let modoActual = "";
    let scannerActivo = false;
    
    // ==================== INICIALIZACIÓN ====================
    async function init() {
        await cargarAnosAcademicos();
        setupEventListeners();
        cargarTab(currentTab);
    }
    
    async function cargarAnosAcademicos() {
        const { data: anos } = await supabase.from('ano_academico').select('*').order('id', { ascending: false });
        const select = document.getElementById('selectAnoAcademico');
        if(!anos || anos.length === 0) {
            select.innerHTML = '<option>Crear años académicos en SQL</option>';
            return;
        }
        select.innerHTML = '';
        anos.forEach(ano => {
            const option = document.createElement('option');
            option.value = ano.id;
            option.textContent = `${ano.nombre} ${ano.activo ? '(Activo)' : ''}`;
            if (ano.activo) {
                option.selected = true;
                currentAnoId = ano.id;
            }
            select.appendChild(option);
        });
        select.addEventListener('change', (e) => {
            currentAnoId = parseInt(e.target.value);
            if (currentTab) cargarTab(currentTab);
        });
    }
    
    function setupEventListeners() {
        document.querySelectorAll('.nav-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTab = btn.dataset.tab;
                cargarTab(currentTab);
            });
        });
        document.getElementById('btnCerrarScanner').addEventListener('click', cerrarScanner);
    }
    
    async function cargarTab(tab) {
        const panel = document.getElementById('mainPanel');
        if (!currentAnoId) { 
            panel.innerHTML = '<div class="card">⚠️ Selecciona o crea un año académico en la base de datos.</div>'; 
            return;
        }
        if(tab === 'alumnos') await cargarAlumnos();
        else if(tab === 'socios') await cargarSocios();
        else if(tab === 'biblioteca') await cargarBiblioteca();
        else if(tab === 'informes') await cargarInformes();
        else if(tab === 'prestamos') await cargarPrestamosRapido();
    }
    
    // ==================== ALUMNOS (NUEVA VERSIÓN CON BUSCADOR) ====================
    async function cargarAlumnos() {
        let html = `
            <div class="card">
                <div class="flex"><h2>👨‍🎓 Buscar Alumno</h2><button id="btnNuevoAlumno" class="success">➕ Nuevo Alumno</button></div>
                <div class="search-filters">
                    <div class="form-grid">
                        <div><label>🔍 Buscar por</label><input type="text" id="searchInput" placeholder="Nombre, apellidos, código o curso..."></div>
                    </div>
                    <button id="btnBuscar" style="margin-top:10px;">Buscar</button>
                    <button id="btnLimpiar" class="secondary" style="margin-top:10px;">Limpiar</button>
                </div>
                <div id="resultadosBusqueda" class="resultados">
                    <p style="color:#64748b; text-align:center;">🔎 Usa el buscador para encontrar alumnos</p>
                </div>
            </div>
        `;
        document.getElementById('mainPanel').innerHTML = html;
        
        document.getElementById('btnNuevoAlumno').onclick = () => editarAlumno(null);
        document.getElementById('btnBuscar').onclick = () => buscarAlumnos();
        document.getElementById('btnLimpiar').onclick = () => {
            document.getElementById('searchInput').value = '';
            document.getElementById('resultadosBusqueda').innerHTML = '<p style="color:#64748b; text-align:center;">🔎 Usa el buscador para encontrar alumnos</p>';
        };
        // Permitir buscar con Enter
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') buscarAlumnos();
        });
    }
    
    async function buscarAlumnos() {
        const searchTerm = document.getElementById('searchInput').value.trim();
        const resultadosDiv = document.getElementById('resultadosBusqueda');
        
        if (!searchTerm) {
            resultadosDiv.innerHTML = '<p style="color:#64748b; text-align:center;">Escribe algo para buscar</p>';
            return;
        }
        
        resultadosDiv.innerHTML = '<p>Buscando...</p>';
        
        // Búsqueda por nombre, apellidos (si existe), codigo_usuario, o curso (desde historial)
        let query = supabase
            .from('alumnos')
            .select('*, historial_alumnos!inner(*)')
            .eq('historial_alumnos.ano_academico_id', currentAnoId);
        
        // Intentar búsqueda por número de código si es número
        if (!isNaN(searchTerm) && searchTerm !== '') {
            query = query.eq('codigo_usuario', parseInt(searchTerm));
        } else {
            // Búsqueda por texto
            query = query.or(`nombre.ilike.%${searchTerm}%,apellidos.ilike.%${searchTerm}%`);
            // También buscar por curso
            const { data: porCurso } = await supabase
                .from('historial_alumnos')
                .select('alumno_id')
                .eq('ano_academico_id', currentAnoId)
                .ilike('curso', `%${searchTerm}%`);
            
            if(porCurso && porCurso.length > 0) {
                const ids = porCurso.map(p => p.alumno_id);
                query = query.or(`id.in.(${ids.join(',')})`);
            }
        }
        
        const { data: alumnos, error } = await query;
        
        if (error) {
            resultadosDiv.innerHTML = `<p>Error: ${error.message}</p>`;
            return;
        }
        
        if (!alumnos || alumnos.length === 0) {
            resultadosDiv.innerHTML = `
                <p>No se encontraron alumnos</p>
                <button id="btnCrearDesdeBusqueda" class="success">➕ Crear nuevo alumno</button>
            `;
            document.getElementById('btnCrearDesdeBusqueda')?.onclick = () => editarAlumno(null);
            return;
        }
        
        // Mostrar resultados
        let html = `<h3>Resultados (${alumnos.length})</h3>`;
        for (const alumno of alumnos) {
            // Obtener datos del historial actual
            const { data: historial } = await supabase
                .from('historial_alumnos')
                .select('*')
                .eq('alumno_id', alumno.id)
                .eq('ano_academico_id', currentAnoId)
                .single();
            
            html += `
                <div class="alumno-row" onclick="window.editarAlumno(${alumno.id})">
                    <div class="alumno-info">
                        <strong>${alumno.nombre} ${alumno.apellidos || ''}</strong><br>
                        📋 Código: ${alumno.codigo_usuario || 'Sin código'} | Curso: ${historial?.curso || '-'} ${historial?.grupo || ''}<br>
                        🆔 ID: ${alumno.id}
                    </div>
                    <div class="alumno-actions">
                        <span class="edit-icon" onclick="event.stopPropagation(); window.editarAlumno(${alumno.id})">✏️</span>
                    </div>
                </div>
            `;
        }
        resultadosDiv.innerHTML = html;
    }
    
    window.editarAlumno = async (alumnoId) => {
        currentEditingAlumnoId = alumnoId;
        let alumno = null;
        let historialActual = null;
        
        if(alumnoId) {
            const { data: a } = await supabase.from('alumnos').select('*').eq('id', alumnoId).single();
            alumno = a;
            const { data: h } = await supabase.from('historial_alumnos').select('*').eq('alumno_id', alumnoId).eq('ano_academico_id', currentAnoId).maybeSingle();
            historialActual = h;
        }
        
        const { data: prestamos } = alumnoId ? await supabase.from('prestamos').select('*, libros(*)').eq('alumno_id', alumnoId).eq('entregado', false) : { data: [] };
        
        let html = `<div class="card">
            <h2>${alumnoId ? '✏️ Editando: ' + (alumno?.nombre || '') : '➕ Nuevo Alumno'}</h2>
            <div class="form-grid">
                <div><label>Nombre</label><input id="editNombre" value="${alumno?.nombre || ''}"></div>
                <div><label>Apellidos</label><input id="editApellidos" value="${alumno?.apellidos || ''}"></div>
                <div><label>Código de usuario (automático)</label><input id="editCodigo" value="${alumno?.codigo_usuario || 'Se generará automáticamente'}" disabled style="background:#f0f0f0;"></div>
                <div><label>Curso</label><select id="editCurso"><option>1ESO</option><option>2ESO</option><option>3ESO</option><option>4ESO</option><option>1BAC</option><option>2BAC</option></select></div>
                <div><label>Grupo</label><input id="editGrupo" value="${historialActual?.grupo || ''}"></div>
                <div><label>Teléfono</label><input id="editTelefono" value="${historialActual?.telefono || ''}"></div>
                <div><label><input type="checkbox" id="editBilingue" ${historialActual?.bilingue ? 'checked' : ''}> Bilingüe</label></div>
                <div><label><input type="checkbox" id="editBeca" ${historialActual?.beca ? 'checked' : ''}> Beca</label></div>
                <div><label>Socio AMPA</label><input type="text" id="editSocioDisplay" value="${historialActual?.socio_ampa ? 'Sí' : 'No'}" disabled style="background:#f0f0f0;"></div>
                <div><label>Donante</label><input type="text" id="editDonanteDisplay" value="${historialActual?.donante ? 'Sí' : 'No'}" disabled style="background:#f0f0f0;"></div>
                <div><label>Observaciones</label><textarea id="editObservaciones">${historialActual?.observaciones || ''}</textarea></div>
            </div>
            <div style="background:#fef3c7; padding:12px; border-radius:12px; margin:12px 0;">
                <small>📌 Nota: Socio AMPA y Donante se editan desde las secciones "SOCIOS AMPA" y "BIBLIOTECA" respectivamente.</small>
            </div>
            <h3>📚 Libros Prestados</h3>
            <div id="prestamosLista">${prestamos?.map(p => `<div>📖 ${p.libros?.titulo} <button onclick="window.devolverLibroRapido(${p.id})">Devolver</button></div>`).join('') || '<p>Sin préstamos activos</p>'}</div>
            <div class="flex">
                <button id="guardarAlumnoBtn">💾 Guardar</button>
                ${alumnoId ? '<button id="imprimirAlumnoBtn" class="secondary">🖨️ Imprimir ficha</button>' : ''}
                ${alumnoId ? '<button id="bajaAlumnoBtn" class="danger">🗑️ Dar de baja</button>' : ''}
                <button class="secondary" onclick="cargarAlumnos()">Cancelar</button>
            </div>
        </div>`;
        document.getElementById('mainPanel').innerHTML = html;
        
        if(document.getElementById('editCurso')) document.getElementById('editCurso').value = historialActual?.curso || '1ESO';
        
        document.getElementById('guardarAlumnoBtn').onclick = async () => {
            let nuevoAlumnoId = alumnoId;
            if(!alumnoId) {
                const { data: nuevo, error } = await supabase.from('alumnos').insert({ 
                    nombre: document.getElementById('editNombre').value,
                    apellidos: document.getElementById('editApellidos').value
                }).select().single();
                if(error) { alert('Error: ' + error.message); return; }
                nuevoAlumnoId = nuevo.id;
                alert(`Alumno creado con código: ${nuevo.codigo_usuario}`);
            } else {
                await supabase.from('alumnos').update({ 
                    nombre: document.getElementById('editNombre').value,
                    apellidos: document.getElementById('editApellidos').value
                }).eq('id', alumnoId);
            }
            
            const historialData = {
                alumno_id: nuevoAlumnoId,
                ano_academico_id: currentAnoId,
                curso: document.getElementById('editCurso').value,
                grupo: document.getElementById('editGrupo').value,
                telefono: document.getElementById('editTelefono').value,
                bilingue: document.getElementById('editBilingue').checked,
                beca: document.getElementById('editBeca').checked,
                socio_ampa: historialActual?.socio_ampa || false,
                donante: historialActual?.donante || false,
                observaciones: document.getElementById('editObservaciones').value,
                activo: true
            };
            if (historialActual?.id) await supabase.from('historial_alumnos').update(historialData).eq('id', historialActual.id);
            else await supabase.from('historial_alumnos').insert(historialData);
            alert('Alumno guardado');
            cargarAlumnos();
        };
        
        if(document.getElementById('imprimirAlumnoBtn')) {
            document.getElementById('imprimirAlumnoBtn').onclick = () => {
                const ventana = window.open('', '_blank');
                ventana.document.write(`
                    <html>
                    <head><title>Ficha de ${alumno?.nombre}</title></head>
                    <body style="font-family:sans-serif; padding:20px;">
                        <h1>Ficha de Alumno</h1>
                        <p><strong>Código:</strong> ${alumno?.codigo_usuario}</p>
                        <p><strong>Nombre:</strong> ${alumno?.nombre} ${alumno?.apellidos || ''}</p>
                        <p><strong>Curso:</strong> ${historialActual?.curso} ${historialActual?.grupo || ''}</p>
                        <p><strong>Teléfono:</strong> ${historialActual?.telefono || '-'}</p>
                        <p><strong>Bilingüe:</strong> ${historialActual?.bilingue ? 'Sí' : 'No'}</p>
                        <p><strong>Beca:</strong> ${historialActual?.beca ? 'Sí' : 'No'}</p>
                        <p><strong>Socio AMPA:</strong> ${historialActual?.socio_ampa ? 'Sí' : 'No'}</p>
                        <p><strong>Donante:</strong> ${historialActual?.donante ? 'Sí' : 'No'}</p>
                        <p><strong>Observaciones:</strong> ${historialActual?.observaciones || '-'}</p>
                        <hr>
                        <p>Fecha impresión: ${new Date().toLocaleString()}</p>
                    </body>
                    </html>
                `);
                ventana.document.close();
            };
        }
        
        if(document.getElementById('bajaAlumnoBtn')) {
            document.getElementById('bajaAlumnoBtn').onclick = () => {
                if(confirm('¿Dar de baja a este alumno? Se conservará el historial.')) {
                    const motivo = prompt('Motivo de la baja:');
                    if(motivo) {
                        supabase.from('bajas_alumnos').insert({ alumno_id: alumnoId, motivo: motivo });
                        supabase.from('historial_alumnos').update({ activo: false }).eq('alumno_id', alumnoId).eq('ano_academico_id', currentAnoId);
                        alert('Alumno dado de baja');
                        cargarAlumnos();
                    }
                }
            };
        }
    };
    
    window.devolverLibroRapido = async (prestamoId) => {
        await supabase.from('prestamos').update({ entregado: true, fecha_devolucion: new Date().toISOString().slice(0,10) }).eq('id', prestamoId);
        alert('Libro devuelto');
        if(currentEditingAlumnoId) window.editarAlumno(currentEditingAlumnoId);
        else cargarAlumnos();
    };
    
    // ==================== SOCIOS ====================
    async function cargarSocios() {
        const { data: socios } = await supabase.from('socios').select('*, alumnos(*)').eq('ano_academico_id', currentAnoId);
        let html = `<div class="card"><h2>💰 Socios AMPA</h2><button id="btnRegistrarPago">➕ Registrar Pago</button><div id="listaSocios"></div></div>`;
        document.getElementById('mainPanel').innerHTML = html;
        document.getElementById('btnRegistrarPago').onclick = () => registrarPagoSocio();
        const container = document.getElementById('listaSocios');
        if (!socios?.length) { container.innerHTML = '<p>No hay socios este año</p>'; return; }
        let listHtml = '';
        socios.forEach(s => {
            listHtml += `<div class="alumno-row"><div><strong>${s.alumnos?.nombre}</strong><br>Nº Socio: ${s.n_socio} | Pagado: ${s.fecha_pago}</div></div>`;
        });
        container.innerHTML = listHtml;
    }
    
    async function registrarPagoSocio() {
        const { data: alumnos } = await supabase.from('alumnos').select('*');
        let options = alumnos.map(a => `<option value="${a.id}">${a.nombre} ${a.apellidos || ''}</option>`).join('');
        let html = `<div class="card"><h2>Registrar Pago AMPA</h2>
        <div class="form-grid"><div><label>Alumno</label><select id="socioAlumnoId">${options}</select></div>
        <div><label>Fecha Pago</label><input type="date" id="socioFechaPago" value="${new Date().toISOString().slice(0,10)}"></div></div>
        <div class="flex"><button id="confirmarPagoBtn">Guardar</button><button class="secondary" onclick="cargarSocios()">Cancelar</button></div></div>`;
        document.getElementById('mainPanel').innerHTML = html;
        document.getElementById('confirmarPagoBtn').onclick = async () => {
            const alumnoId = parseInt(document.getElementById('socioAlumnoId').value);
            const fecha = document.getElementById('socioFechaPago').value;
            const { data: ultimo } = await supabase.from('socios').select('n_socio').order('n_socio', { ascending: false }).limit(1);
            let nuevoNumero = ultimo?.length ? ultimo[0].n_socio + 1 : 1;
            await supabase.from('socios').insert({ n_socio: nuevoNumero, alumno_id: alumnoId, ano_academico_id: currentAnoId, fecha_pago: fecha });
            await supabase.from('historial_alumnos').update({ socio_ampa: true }).eq('alumno_id', alumnoId).eq('ano_academico_id', currentAnoId);
            alert(`Socio Nº ${nuevoNumero}`);
            cargarSocios();
        };
    }
    
    // ==================== BIBLIOTECA ====================
    async function cargarBiblioteca() {
        const { data: libros } = await supabase.from('libros').select('*').order('created_at', { ascending: false });
        let html = `<div class="card"><h2>📖 Biblioteca</h2><div class="flex"><button id="btnNuevoLibro">➕ Nuevo Libro</button></div><div id="listaBiblioteca"></div></div>`;
        document.getElementById('mainPanel').innerHTML = html;
        document.getElementById('btnNuevoLibro').onclick = () => mostrarFormularioLibro();
        const container = document.getElementById('listaBiblioteca');
        if (!libros?.length) { container.innerHTML = '<p>No hay libros</p>'; return; }
        let listHtml = '';
        libros.forEach(l => {
            listHtml += `<div class="alumno-row"><div><strong>${l.titulo}</strong><br>Signatura: ${l.signatura || '-'} | Estado: ${l.estado || 'nuevo'}</div>
            <div><button onclick="window.editarLibro(${l.id})">✏️</button></div></div>`;
        });
        container.innerHTML = listHtml;
    }
    
    window.editarLibro = async (libroId) => {
        const { data: libro } = await supabase.from('libros').select('*').eq('id', libroId).single();
        let html = `<div class="card"><h2>Editar Libro</h2><div class="form-grid">
        <div><label>Título</label><input id="editTitulo" value="${libro.titulo}"></div>

    // ==================== ESCÁNER ====================
    function abrirScanner() {
        if (scannerActivo) return;
        document.getElementById("scannerModal").style.display = "block";
        if (!html5QrCode) html5QrCode = new Html5Qrcode("qr-reader");
        scannerActivo = true;
        html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 250, height: 250 } },
            (texto) => {
                if (html5QrCode && html5QrCode.isScanning) {
                    html5QrCode.stop().then(() => {
                        scannerActivo = false;
                        document.getElementById("scannerModal").style.display = "none";
                        procesarEscaneo(texto);
                    }).catch(() => {
                        scannerActivo = false;
                        document.getElementById("scannerModal").style.display = "none";
                        procesarEscaneo(texto);
                    });
                } else {
                    scannerActivo = false;
                    document.getElementById("scannerModal").style.display = "none";
                    procesarEscaneo(texto);
                }
            },
            (error) => {}
        ).catch(err => {
            alert("Error cámara: " + err);
            cerrarScanner();
        });
    }
    
    function cerrarScanner() {
        scannerActivo = false;
        if (html5QrCode && html5QrCode.isScanning) {
            try {
                html5QrCode.stop();
            } catch(e) {}
        }
        document.getElementById("scannerModal").style.display = "none";
    }
